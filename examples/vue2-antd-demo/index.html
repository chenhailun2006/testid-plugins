<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue2 + Ant Design Vue — Webpack TestId Demo</title>
  <!-- Ant Design Vue CSS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@1.7.8/dist/antd.css" />
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- CDN 外部依赖 (webpack externals) -->
  <script src="https://unpkg.com/vue@2.7.16/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.js"></script>
  <!-- moment: Ant Design Vue 1.x DatePicker 等组件依赖 -->
  <script src="https://unpkg.com/moment@2.29.4/min/moment.min.js"></script>
  <script src="https://unpkg.com/ant-design-vue@1.7.8/dist/antd.min.js"></script>
</body>
</html>
